        <section class="contact-section" id="contacto">

                <div class="contact-content">
                    <a href="mailto:carnifis@gmail.com" class="email-link">
                        <span class="email-icon">✉</span>
                        <span class="email-text">carnifis@gmail.com</span>

        <section class="coffee-section" id="cafe">

                <h2 class="section-title lang" data-es="Apoya mi trabajo" data-en="Support my work"></h2>

                <div class="coffee-content">

                    </div>
                    <div class="coffee-info">
                        <p class="coffee-text lang" data-es="Puedes comprarme un café en" data-en="You can buy me a coffee at"></p>
                        <a href="https://buymeacoffee.com/carnifis" target="_blank" rel="noopener noreferrer" class="coffee-link">buymeacoffee.com/carnifis</a>
