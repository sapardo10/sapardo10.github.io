            <div class="app-card-head">

                <h1 style="font-size:2rem;font-weight:800;letter-spacing:-0.02em;margin:0;"><span class="lang" data-es="Términos y Condiciones de WalkCast" data-en="WalkCast Terms of Use (EULA)"></span></h1>
            </div>

            <p class="lang" style="margin-top:1.25rem;" data-es="Lee estos Términos y Condiciones con atención antes de usar WalkCast. Al descargar o usar la app, aceptas quedar vinculado por estos términos. WalkCast es operada por Sergio Pardo, desarrollador individual con sede en la República de Colombia." data-en="Please read these Terms and Conditions carefully before using WalkCast. By downloading or using the app, you agree to be bound by these terms. WalkCast is operated by Sergio Pardo, an individual developer based in the Republic of Colombia."></p>
            <p class="updated lang" data-es="Última actualización: 18 de junio de 2026" data-en="Last updated: June 18, 2026"></p>

            <h2 class="lang" data-es="1. La aplicación" data-en="1. The App"></h2>
            <p class="lang" data-es="WalkCast es una aplicación de audioguías con IA. Introduces una ubicación y la app genera un tour de audio original mediante inteligencia artificial. Los tours se generan bajo demanda y no son revisados, verificados ni redactados por nosotros." data-en="WalkCast is an AI-powered audio tour application. You enter a location and the app generates an original spoken audio tour using artificial intelligence. Tours are generated on demand and are not curated, verified, or authored by us."></p>

            <h2 class="lang" data-es="2. Suscripciones y compras" data-en="2. Subscriptions and Purchases"></h2>
            <p class="lang" data-es="Planes disponibles:" data-en="Available plans:"></p>
            <ul>
                <li class="lang" data-es="Gratis — limitado a un tour generado." data-en="Free — limited to one generated tour."></li>
                <li class="lang" data-es="Pro (Mensual / Anual) — tours ilimitados con nuestra clave de IA, facturado como suscripción de renovación automática." data-en="Pro (Monthly / Yearly) — unlimited tours using our AI API key, billed as an auto-renewing subscription."></li>
                <li class="lang" data-es="BYO API Key (Pago único) — compra única que permite usar tu propia clave de proveedor de IA para tours ilimitados." data-en="BYO API Key (Lifetime) — a one-time purchase that lets you use your own AI provider API key for unlimited tours."></li>
            </ul>
            <p class="lang" data-es="Facturación y renovación: los pagos se cargan a tu cuenta de App Store de Apple o Google Play al confirmar la compra. Las suscripciones se renuevan automáticamente salvo que se cancelen al menos 24 horas antes del fin del periodo actual. Puedes gestionar y cancelar suscripciones en los ajustes de tu cuenta de App Store o Google Play." data-en="Billing and renewal: payments are charged to your Apple App Store or Google Play account at confirmation of purchase. Subscriptions automatically renew unless cancelled at least 24 hours before the end of the current period. You can manage and cancel subscriptions in your App Store or Google Play account settings."></p>
            <p class="lang" data-es="Reembolsos: las solicitudes de reembolso las gestiona Apple App Store o Google Play según sus respectivas políticas. No emitimos reembolsos directamente. También puedes usar la opción “Gestionar suscripción” en la app para acceder al Customer Center de RevenueCat." data-en="Refunds: refund requests are handled by the Apple App Store or Google Play under their respective policies. We do not issue refunds directly. You may also use the “Manage Subscription” option in the app to access RevenueCat's Customer Center."></p>
            <p class="lang" data-es="Cambios de precio: podemos cambiar los precios de suscripción y te daremos aviso razonable. El uso continuado tras un cambio de precio constituye tu aceptación del nuevo precio." data-en="Price changes: we may change subscription prices and will give you reasonable notice. Continued use after a price change constitutes your agreement to the new price."></p>

            <h2 class="lang" data-es="3. Contenido generado por IA" data-en="3. AI-Generated Content"></h2>
            <p class="lang" data-es="Los tours se producen mediante modelos de lenguaje (como Claude de Anthropic o Gemini de Google). El contenido generado por IA puede ser inexacto, incompleto o desactualizado. Los tours son para entretenimiento e interés general y no sustituyen fuentes históricas verificadas, guías profesionales ni herramientas de navegación. Usas el contenido bajo tu propio riesgo." data-en="Tours are produced by large language models (such as Claude by Anthropic or Gemini by Google). AI-generated content may be inaccurate, incomplete, or outdated. Tours are intended for entertainment and general interest and are not a substitute for verified historical sources, professional guides, or navigation tools. You use the content at your own risk."></p>

            <h2 class="lang" data-es="4. Uso aceptable" data-en="4. Acceptable Use"></h2>
            <p class="lang" data-es="Aceptas no usar la app para fines ilícitos, no realizar ingeniería inversa ni extraer su código, no generar contenido dañino o difamatorio, no revender el acceso, ni eludir comprobaciones de suscripción o derechos." data-en="You agree not to use the app for unlawful purposes, reverse-engineer or extract its source code, generate harmful or defamatory content, resell access, or circumvent any subscription or entitlement check."></p>

            <h2 class="lang" data-es="5. Claves de API de terceros (plan BYO)" data-en="5. Third-Party API Keys (BYO Plan)"></h2>
            <p class="lang" data-es="Si usas el plan BYO con tu propia clave, eres responsable de cumplir los términos del proveedor de IA, de los costes en tu cuenta y de mantener la clave segura. La almacenamos cifrada solo en tu dispositivo y nunca la transmitimos a nuestros servidores." data-en="If you use the BYO plan with your own key, you are responsible for complying with the AI provider's terms, for any costs on your account, and for keeping your key secure. We store it encrypted on your device only and never transmit it to our servers."></p>

            <h2 class="lang" data-es="6. Propiedad intelectual" data-en="6. Intellectual Property"></h2>
            <p class="lang" data-es="La app WalkCast, su nombre, logo y diseño son propiedad intelectual de Sergio Pardo. El contenido generado por IA se produce a tu solicitud y no es propiedad nuestra; tus derechos sobre él están sujetos a los términos del proveedor de IA subyacente." data-en="The WalkCast app, its name, logo, and design are the intellectual property of Sergio Pardo. AI-generated content is produced at your request and is not owned by us; your rights to it are subject to the underlying AI provider's terms."></p>

            <h2 class="lang" data-es="7. Renuncias de garantía" data-en="7. Disclaimers"></h2>
            <p class="lang" data-es="La app se ofrece “tal cual” y “según disponibilidad”, sin garantías de ningún tipo. No garantizamos que sea ininterrumpida, libre de errores o de virus, que los tours cumplan tus requisitos, ni que esté disponible en todas las regiones en todo momento." data-en="The app is provided “as is” and “as available”, without warranties of any kind. We do not warrant that it will be uninterrupted, error-free, or virus-free, that tours will meet your requirements, or that it will be available in all regions at all times."></p>

            <h2 class="lang" data-es="8. Limitación de responsabilidad" data-en="8. Limitation of Liability"></h2>
            <p class="lang" data-es="En la máxima medida permitida por la ley, Sergio Pardo no será responsable de daños indirectos, incidentales, especiales, consecuentes o punitivos derivados de tu uso de la app. Nuestra responsabilidad total no excederá el importe que nos hayas pagado en los doce meses anteriores a la reclamación." data-en="To the fullest extent permitted by law, Sergio Pardo shall not be liable for any indirect, incidental, special, consequential, or punitive damages arising from your use of the app. Our total liability will not exceed the amount you paid us in the twelve months preceding the claim."></p>

            <h2 class="lang" data-es="9. Cambios" data-en="9. Changes"></h2>
            <p class="lang" data-es="Podemos modificar o discontinuar la app en cualquier momento y actualizar estos términos periódicamente. La fecha de “Última actualización” refleja los cambios. El uso continuado tras los cambios constituye su aceptación." data-en="We may modify or discontinue the app at any time and update these terms periodically. The “Last updated” date reflects changes. Continued use after changes constitutes acceptance."></p>

            <h2 class="lang" data-es="10. Ley aplicable" data-en="10. Governing Law"></h2>
            <p class="lang" data-es="Estos términos se rigen por las leyes de la República de Colombia, y las disputas se someten a los tribunales de Bogotá, Colombia. Si eres consumidor en la UE, el Reino Unido, EE. UU. u otra jurisdicción con leyes de protección al consumidor imperativas, esas leyes pueden aplicarse adicionalmente." data-en="These terms are governed by the laws of the Republic of Colombia, and disputes are subject to the courts of Bogotá, Colombia. If you are a consumer in the EU, UK, US, or another jurisdiction with mandatory consumer-protection laws, those laws may additionally apply."></p>

            <h2 class="lang" data-es="11. Contacto" data-en="11. Contact"></h2>
