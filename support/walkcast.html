<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte - WalkCast</title>
    <link rel="icon" type="image/png" href="../assets/icons/favicon.png">
    <link rel="stylesheet" href="../styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-accent: #E8A44A;
            --app-accent-2: #0D0D0D;
            --app-accent-soft: rgba(232, 164, 74, 0.16);
        }
    </style>
</head>
<body>
    <div class="stars-background"></div>

    <div id="site-nav"></div>

    <section class="page-section">
        <div class="container">
            <div class="support-card">
                <div class="app-card-head">
                    <img src="../assets/images/apps/walkcast.png" alt="WalkCast" class="app-icon-img">
                    <h3 style="margin:0;"><span class="lang" data-es="Soporte de WalkCast" data-en="WalkCast Support"></span></h3>
                </div>
                <p class="lang" data-es="¿Necesitas ayuda con tu guía turístico con IA? Aquí encontrarás respuestas a las preguntas más comunes." data-en="Need help with your AI tour guide? Find answers to the most common questions below."></p>
            </div>

            <h2 class="section-title" style="margin-top:3rem;"><span class="lang" data-es="Preguntas frecuentes" data-en="Frequently asked questions"></span></h2>

            <div style="max-width:760px;margin:2rem auto 0;">
                <div class="faq-item">
                    <h3 class="lang" data-es="¿Cómo genero un tour?" data-en="How do I generate a tour?"></h3>
                    <p class="lang" data-es="Escribe cualquier ubicación o usa tu GPS y la IA generará segmentos históricos que se narran automáticamente." data-en="Enter any location or use your GPS, and the AI will generate historical segments that are narrated automatically."></p>
                </div>
                <div class="faq-item">
                    <h3 class="lang" data-es="¿Funciona la reproducción en segundo plano?" data-en="Does background playback work?"></h3>
                    <p class="lang" data-es="Sí. Puedes bloquear la pantalla y seguir escuchando, con controles en la pantalla de bloqueo." data-en="Yes. You can lock the screen and keep listening, with lock-screen controls."></p>
                </div>
                <div class="faq-item">
                    <h3 class="lang" data-es="¿Qué diferencia hay entre Free y Pro?" data-en="What's the difference between Free and Pro?"></h3>
                    <p class="lang" data-es="Free incluye tours limitados; Pro ofrece tours ilimitados. También puedes usar tu propia clave de API." data-en="Free includes limited tours; Pro offers unlimited tours. You can also bring your own API key."></p>
                </div>
                <div class="faq-item">
                    <h3 class="lang" data-es="¿Puedo usar mi propia clave de API?" data-en="Can I use my own API key?"></h3>
                    <p class="lang" data-es="Sí. WalkCast admite el modo 'trae tu propia clave de API' para generar tours con tu proveedor de IA preferido." data-en="Yes. WalkCast supports a bring-your-own-API-key mode to generate tours with your preferred AI provider."></p>
                </div>
                <div class="faq-item">
                    <h3 class="lang" data-es="¿Puedo escuchar tours sin conexión?" data-en="Can I listen to tours offline?"></h3>
                    <p class="lang" data-es="Tu historial de tours se guarda sin conexión y puedes reproducirlo de nuevo en cualquier momento." data-en="Your tour history is saved offline and you can replay it any time."></p>
                </div>
            </div>

            <div class="support-card" style="max-width:760px;margin:3rem auto 0;text-align:center;">
                <h3 class="lang" data-es="¿Aún necesitas ayuda?" data-en="Still need help?"></h3>
                <p class="lang" data-es="Escríbenos y te responderemos lo antes posible." data-en="Write to us and we'll get back to you as soon as possible."></p>
                <a href="mailto:carnifis+walkcast@gmail.com" class="email-link" style="margin-top:0.5rem;">
                    <span class="email-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="m3 7 9 6 9-6"></path></svg></span>
                    <span class="email-text lang" data-es="Contáctanos" data-en="Contact us"></span>
                </a>
            </div>

            <p style="text-align:center;margin-top:2.5rem;">
                <a href="../apps/walkcast.html" class="lang" data-es="← Volver a WalkCast" data-en="← Back to WalkCast"></a>
                &nbsp;·&nbsp;
                <a href="../privacy/walkcast.html" class="lang" data-es="Privacidad" data-en="Privacy"></a>
            </p>
        </div>
    </section>

    <div id="site-footer"></div>

    <script src="../script.js"></script>
</body>
</html>
