<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte - Stampway</title>
    <link rel="icon" type="image/png" href="../assets/icons/favicon.png">
    <link rel="stylesheet" href="../styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-accent: #1A2F4E;
            --app-accent-2: #C9A84C;
            --app-accent-soft: rgba(201, 168, 76, 0.14);
        }
    </style>
</head>
<body>
    <div class="stars-background"></div>

    <div id="site-nav"></div>

    <section class="page-section">
        <div class="container">
            <div class="support-card">
                <div class="app-card-head">
                    <img src="../assets/images/apps/stampway.png" alt="Stampway" class="app-icon-img">
                    <h3 style="margin:0;"><span class="lang" data-es="Soporte de Stampway" data-en="Stampway Support"></span></h3>
                </div>
                <p class="lang" data-es="¿Necesitas ayuda con tu pasaporte digital de viajes? Aquí encontrarás respuestas a las preguntas más comunes." data-en="Need help with your digital travel passport? Find answers to the most common questions below."></p>
            </div>

            <h2 class="section-title" style="margin-top:3rem;"><span class="lang" data-es="Preguntas frecuentes" data-en="Frequently asked questions"></span></h2>

            <div style="max-width:760px;margin:2rem auto 0;">
                <div class="faq-item">
                    <h3 class="lang" data-es="¿Cómo añado un sello?" data-en="How do I add a stamp?"></h3>
                    <p class="lang" data-es="Toca el botón de añadir, elige el país, indica entrada/salida, fecha, transporte y cualquier nota. El sello aparecerá en tu pasaporte." data-en="Tap the add button, choose the country, set entry/exit, date, transport and any notes. The stamp will appear in your passport."></p>
                </div>
                <div class="faq-item">
                    <h3 class="lang" data-es="¿Qué incluye la versión gratuita?" data-en="What does the free version include?"></h3>
                    <p class="lang" data-es="La versión gratuita te permite registrar hasta 5 países. Premium desbloquea países ilimitados y funciones adicionales." data-en="The free version lets you record up to 5 countries. Premium unlocks unlimited countries and extra features."></p>
                </div>
                <div class="faq-item">
                    <h3 class="lang" data-es="¿Cómo cambio el idioma?" data-en="How do I change the language?"></h3>
                    <p class="lang" data-es="Stampway está disponible en inglés, español, portugués y francés. Puedes cambiar el idioma en los ajustes de la app." data-en="Stampway is available in English, Spanish, Portuguese and French. You can change the language in the app settings."></p>
                </div>
                <div class="faq-item">
                    <h3 class="lang" data-es="¿Cómo restauro mi compra premium?" data-en="How do I restore my premium purchase?"></h3>
                    <p class="lang" data-es="Abre los ajustes y toca 'Restaurar compras'. Asegúrate de usar la misma cuenta de Google Play con la que compraste." data-en="Open settings and tap 'Restore purchases'. Make sure you're using the same Google Play account you bought with."></p>
                </div>
                <div class="faq-item">
                    <h3 class="lang" data-es="¿Cómo invito a un amigo?" data-en="How do I invite a friend?"></h3>
                    <p class="lang" data-es="Usa la opción de invitar y compartir dentro de la app para enviar tu invitación a amigos." data-en="Use the invite & share option inside the app to send your invitation to friends."></p>
                </div>
            </div>

            <div class="support-card" style="max-width:760px;margin:3rem auto 0;text-align:center;">
                <h3 class="lang" data-es="¿Aún necesitas ayuda?" data-en="Still need help?"></h3>
                <p class="lang" data-es="Escríbenos y te responderemos lo antes posible." data-en="Write to us and we'll get back to you as soon as possible."></p>
                <a href="mailto:carnifis+stampway@gmail.com" class="email-link" style="margin-top:0.5rem;">
                    <span class="email-icon">✉</span>
                    <span class="email-text">carnifis+stampway@gmail.com</span>
                </a>
            </div>

            <p style="text-align:center;margin-top:2.5rem;">
                <a href="../apps/stampway.html" class="lang" data-es="← Volver a Stampway" data-en="← Back to Stampway"></a>
                &nbsp;·&nbsp;
                <a href="../privacy/stampway.html" class="lang" data-es="Privacidad" data-en="Privacy"></a>
            </p>
        </div>
    </section>

    <div id="site-footer"></div>

    <script src="../script.js"></script>
</body>
</html>
