<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soporte - PingPartner</title>
    <link rel="icon" type="image/png" href="../assets/icons/favicon.png">
    <link rel="stylesheet" href="../styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-accent: #0D7CF2;
            --app-accent-2: #101923;
            --app-accent-soft: rgba(13, 124, 242, 0.14);
        }
    </style>
</head>
<body>
    <div class="stars-background"></div>

    <div id="site-nav"></div>

    <section class="page-section">
        <div class="container">
            <div class="support-card">
                <div class="app-card-head">
                    <img src="../assets/images/apps/pingpartner.png" alt="PingPartner" class="app-icon-img">
                    <h3 style="margin:0;"><span class="lang" data-es="Soporte de PingPartner" data-en="PingPartner Support"></span></h3>
                </div>
                <p class="lang" data-es="¿Necesitas ayuda para conectarte con tu pareja? Aquí encontrarás respuestas a las preguntas más comunes." data-en="Need help connecting with your partner? Find answers to the most common questions below."></p>
            </div>

            <h2 class="section-title" style="margin-top:3rem;"><span class="lang" data-es="Preguntas frecuentes" data-en="Frequently asked questions"></span></h2>

            <div style="max-width:760px;margin:2rem auto 0;">
                <div class="faq-item">
                    <h3 class="lang" data-es="¿Necesito crear una cuenta?" data-en="Do I need to create an account?"></h3>
                    <p class="lang" data-es="No. PingPartner usa autenticación anónima, así que puedes empezar al instante sin registrarte." data-en="No. PingPartner uses anonymous authentication, so you can start instantly without signing up."></p>
                </div>
                <div class="faq-item">
                    <h3 class="lang" data-es="¿Cómo me vinculo con mi pareja?" data-en="How do I link with my partner?"></h3>
                    <p class="lang" data-es="Comparte tu código de 4 caracteres con tu pareja, o introduce el suyo, para conectaros." data-en="Share your 4-character code with your partner, or enter theirs, to connect."></p>
                </div>
                <div class="faq-item">
                    <h3 class="lang" data-es="¿Cómo envío un ping?" data-en="How do I send a ping?"></h3>
                    <p class="lang" data-es="Una vez vinculados, toca el botón para enviar a tu pareja un ping con notificación push al instante." data-en="Once linked, tap the button to send your partner an instant push-notification ping."></p>
                </div>
                <div class="faq-item">
                    <h3 class="lang" data-es="No recibo las notificaciones, ¿qué hago?" data-en="I'm not getting notifications, what do I do?"></h3>
                    <p class="lang" data-es="Comprueba que las notificaciones están activadas para PingPartner en los ajustes de tu dispositivo y que tienes conexión a internet." data-en="Check that notifications are enabled for PingPartner in your device settings and that you have an internet connection."></p>
                </div>
                <div class="faq-item">
                    <h3 class="lang" data-es="¿Mis pings son privados?" data-en="Are my pings private?"></h3>
                    <p class="lang" data-es="Sí. Los pings se entregan de forma privada solo entre tú y tu pareja vinculada." data-en="Yes. Pings are delivered privately, just between you and your linked partner."></p>
                </div>
            </div>

            <div class="support-card" style="max-width:760px;margin:3rem auto 0;text-align:center;">
                <h3 class="lang" data-es="¿Aún necesitas ayuda?" data-en="Still need help?"></h3>
                <p class="lang" data-es="Escríbenos y te responderemos lo antes posible." data-en="Write to us and we'll get back to you as soon as possible."></p>
                <a href="mailto:carnifis+pingpartner@gmail.com" class="email-link" style="margin-top:0.5rem;">
                    <span class="email-icon">✉</span>
                    <span class="email-text">carnifis+pingpartner@gmail.com</span>
                </a>
            </div>

            <p style="text-align:center;margin-top:2.5rem;">
                <a href="../apps/pingpartner.html" class="lang" data-es="← Volver a PingPartner" data-en="← Back to PingPartner"></a>
                &nbsp;·&nbsp;
                <a href="../privacy/pingpartner.html" class="lang" data-es="Privacidad" data-en="Privacy"></a>
            </p>
        </div>
    </section>

    <div id="site-footer"></div>

    <script src="../script.js"></script>
</body>
</html>
