<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Soporte de Pausactive - Ayuda, preguntas frecuentes y contacto.">
    <meta name="theme-color" content="#667eea">
    <title>Soporte · Pausactive</title>
    <link rel="icon" type="image/png" href="../assets/icons/favicon.png">
    <link rel="stylesheet" href="../styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-accent: #667eea;
            --app-accent-2: #764ba2;
            --app-accent-soft: rgba(102, 126, 234, 0.14);
        }
    </style>
</head>
<body>
    <div class="stars-background"></div>

    <!-- Shared navbar injected by script.js -->
    <div id="site-nav"></div>

    <section class="page-section">
        <div class="container">
            <div class="support-card" style="margin-bottom:2.5rem;">
                <div class="app-card-head">
                    <img src="../assets/images/apps/pausactive.png" alt="Pausactive" class="app-icon-img">
                    <h3 style="margin:0;">Pausactive</h3>
                </div>
                <p class="lang" data-es="¿Necesitas ayuda con Pausactive? Estamos aquí para ayudarte a tomar pausas activas y saludables." data-en="Need help with Pausactive? We're here to help you take healthy active breaks."></p>
            </div>

            <h2 class="section-title lang" data-es="Preguntas frecuentes" data-en="Frequently asked questions"></h2>
            <p class="section-subtitle lang" data-es="Respuestas rápidas a las dudas más comunes." data-en="Quick answers to the most common questions."></p>

            <div class="faq-item">
                <h3 class="lang" data-es="¿Cómo configuro los recordatorios de pausa?" data-en="How do I set up break reminders?"></h3>
                <p class="lang" data-es="Ve a los ajustes de recordatorios y personaliza la frecuencia y los horarios a lo largo de tu día." data-en="Go to the reminder settings and customize the frequency and times throughout your day."></p>
            </div>
            <div class="faq-item">
                <h3 class="lang" data-es="¿Qué tipo de ejercicios incluye?" data-en="What kind of exercises are included?"></h3>
                <p class="lang" data-es="La app incluye una biblioteca de pausas activas guiadas, con ejercicios cortos para mover el cuerpo durante el día." data-en="The app includes a library of guided active breaks, with short exercises to move your body during the day."></p>
            </div>
            <div class="faq-item">
                <h3 class="lang" data-es="¿No estoy recibiendo notificaciones?" data-en="I'm not getting notifications?"></h3>
                <p class="lang" data-es="Asegúrate de que las notificaciones estén habilitadas para Pausactive en los ajustes de tu dispositivo y que la optimización de batería no la esté restringiendo." data-en="Make sure notifications are enabled for Pausactive in your device settings and that battery optimization isn't restricting it."></p>
            </div>
            <div class="faq-item">
                <h3 class="lang" data-es="¿Cómo cambio el idioma?" data-en="How do I change the language?"></h3>
                <p class="lang" data-es="Pausactive es multi-idioma. Puedes cambiar el idioma desde los ajustes de la app." data-en="Pausactive is multi-language. You can change the language from the app settings."></p>
            </div>
            <div class="faq-item">
                <h3 class="lang" data-es="¿Dónde se guardan mis datos?" data-en="Where is my data stored?"></h3>
                <p class="lang" data-es="Tus recordatorios y preferencias se guardan en tu dispositivo. Consulta la política de privacidad para más detalles." data-en="Your reminders and preferences are stored on your device. See the privacy policy for more details."></p>
            </div>

            <div class="support-card" style="text-align:center;margin-top:2.5rem;">
                <h3 class="lang" data-es="¿Aún necesitas ayuda?" data-en="Still need help?"></h3>
                <p class="lang" data-es="Escríbenos y te responderemos lo antes posible." data-en="Email us and we'll get back to you as soon as we can."></p>
                <a href="mailto:carnifis+pausactive@gmail.com" class="email-link">
                    <span class="email-icon">✉</span>
                    <span class="email-text">carnifis+pausactive@gmail.com</span>
                </a>
            </div>

            <div class="detail-hero-actions" style="justify-content:center;margin-top:2.5rem;">
                <a href="../apps/pausactive.html" class="btn btn-secondary lang" data-es="← Detalles de la app" data-en="← App details"></a>
                <a href="../privacy/pausactive.html" class="btn btn-secondary lang" data-es="Privacidad" data-en="Privacy"></a>
            </div>
        </div>
    </section>

    <!-- Shared footer injected by script.js -->
    <div id="site-footer"></div>

    <script src="../script.js"></script>
</body>
</html>
