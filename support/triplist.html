<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Soporte de TripList - Ayuda, preguntas frecuentes y contacto.">
    <meta name="theme-color" content="#1A6B8A">
    <title>Soporte · TripList</title>
    <link rel="icon" type="image/png" href="../assets/icons/favicon.png">
    <link rel="stylesheet" href="../styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-accent: #1A6B8A;
            --app-accent-2: #F0A500;
            --app-accent-soft: rgba(26, 107, 138, 0.14);
        }
    </style>
</head>
<body>
    <div class="stars-background"></div>

    <!-- Shared navbar injected by script.js -->
    <div id="site-nav"></div>

    <section class="page-section">
        <div class="container">
            <div class="support-card" style="margin-bottom:2.5rem;">
                <div class="app-card-head">
                    <img src="../assets/images/apps/triplist.png" alt="TripList" class="app-icon-img">
                    <h3 style="margin:0;">TripList</h3>
                </div>
                <p class="lang" data-es="¿Necesitas ayuda con TripList? Estamos aquí para ayudarte a empacar inteligente y viajar ligero." data-en="Need help with TripList? We're here to help you pack smarter and travel lighter."></p>
            </div>

            <h2 class="section-title lang" data-es="Preguntas frecuentes" data-en="Frequently asked questions"></h2>
            <p class="section-subtitle lang" data-es="Respuestas rápidas a las dudas más comunes." data-en="Quick answers to the most common questions."></p>

            <div class="faq-item">
                <h3 class="lang" data-es="¿Cómo creo una nueva lista de equipaje?" data-en="How do I create a new packing list?"></h3>
                <p class="lang" data-es="Toca el botón de añadir, ingresa el destino y las fechas de tu viaje, y empieza a agregar artículos a tu lista." data-en="Tap the add button, enter your trip's destination and dates, and start adding items to your list."></p>
            </div>
            <div class="faq-item">
                <h3 class="lang" data-es="¿Cómo marco un artículo como empacado?" data-en="How do I mark an item as packed?"></h3>
                <p class="lang" data-es="Desliza el artículo o tócalo para marcarlo como empacado con la interfaz rápida de deslizar." data-en="Swipe or tap an item to check it off using the fast swipe-to-pack interface."></p>
            </div>
            <div class="faq-item">
                <h3 class="lang" data-es="¿Cómo funcionan las sugerencias con IA?" data-en="How do AI suggestions work?"></h3>
                <p class="lang" data-es="Tras revisar tus viajes (artículos usados, no usados o alternativas más ligeras), la app aprende de tu historial para sugerir mejores listas en el futuro." data-en="After you review your trips (items used, unused, or lighter alternatives), the app learns from your history to suggest better lists in the future."></p>
            </div>
            <div class="faq-item">
                <h3 class="lang" data-es="¿Qué incluye TripList Pro?" data-en="What does TripList Pro include?"></h3>
                <p class="lang" data-es="TripList Pro es una suscripción que desbloquea analíticas avanzadas y la exportación de tus listas. Las suscripciones se gestionan a través de Google Play." data-en="TripList Pro is a subscription that unlocks advanced analytics and list export. Subscriptions are managed through Google Play."></p>
            </div>
            <div class="faq-item">
                <h3 class="lang" data-es="¿Se guardan mis datos en la nube?" data-en="Is my data stored in the cloud?"></h3>
                <p class="lang" data-es="Tus datos de equipaje se guardan localmente en tu dispositivo. Consulta la política de privacidad para más detalles." data-en="Your packing data is stored locally on your device. See the privacy policy for more details."></p>
            </div>

            <div class="support-card" style="text-align:center;margin-top:2.5rem;">
                <h3 class="lang" data-es="¿Aún necesitas ayuda?" data-en="Still need help?"></h3>
                <p class="lang" data-es="Escríbenos y te responderemos lo antes posible." data-en="Email us and we'll get back to you as soon as we can."></p>
                <a href="mailto:carnifis+triplist@gmail.com" class="email-link">
                    <span class="email-icon"><svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="5" width="18" height="14" rx="2"></rect><path d="m3 7 9 6 9-6"></path></svg></span>
                    <span class="email-text lang" data-es="Contáctanos" data-en="Contact us"></span>
                </a>
            </div>

            <div class="detail-hero-actions" style="justify-content:center;margin-top:2.5rem;">
                <a href="../apps/triplist.html" class="btn btn-secondary lang" data-es="← Detalles de la app" data-en="← App details"></a>
                <a href="../privacy/triplist.html" class="btn btn-secondary lang" data-es="Privacidad" data-en="Privacy"></a>
            </div>
        </div>
    </section>

    <!-- Shared footer injected by script.js -->
    <div id="site-footer"></div>

    <script src="../script.js"></script>
</body>
</html>
