<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacidad - PingPartner</title>
    <link rel="icon" type="image/png" href="../assets/icons/favicon.png">
    <link rel="stylesheet" href="../styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-accent: #0D7CF2;
            --app-accent-2: #101923;
            --app-accent-soft: rgba(13, 124, 242, 0.14);
        }
        .policy { max-width: 780px; margin: 0 auto; }
        .policy h2 { font-size: 1.4rem; font-weight: 700; margin: 2.25rem 0 0.6rem; color: var(--text-dark); }
        .policy p { color: var(--text-mid); margin-bottom: 0.9rem; }
        .policy ul { color: var(--text-mid); margin: 0 0 0.9rem 1.4rem; }
        .policy li { margin-bottom: 0.4rem; }
        .policy .updated { color: var(--text-light); font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="stars-background"></div>

    <div id="site-nav"></div>

    <section class="page-section">
        <div class="container policy">
            <div class="app-card-head">
                <img src="../assets/images/apps/pingpartner.png" alt="PingPartner" class="app-icon-img">
                <h1 style="font-size:2rem;font-weight:800;letter-spacing:-0.02em;margin:0;"><span class="lang" data-es="Política de Privacidad de PingPartner" data-en="PingPartner Privacy Policy"></span></h1>
            </div>

            <p class="lang" style="margin-top:1.25rem;" data-es="Esta política describe cómo PingPartner recopila, usa y protege tu información. PingPartner está diseñada para ser mínima y privada: no requiere registro." data-en="This policy describes how PingPartner collects, uses and protects your information. PingPartner is designed to be minimal and private: it requires no sign-up."></p>
            <p class="updated lang" data-es="Última actualización: 15 de junio de 2026" data-en="Last updated: June 15, 2026"></p>

            <h2 class="lang" data-es="Información que recopilamos" data-en="Information we collect"></h2>
            <p class="lang" data-es="PingPartner no pide tu nombre ni tu correo. Generamos un identificador anónimo para tu dispositivo, el código de vinculación de 4 caracteres que une a las parejas, y un token de notificaciones push para entregar tus pings. También recopilamos datos básicos de uso." data-en="PingPartner does not ask for your name or email. We generate an anonymous identifier for your device, the 4-character linking code that pairs partners, and a push-notification token to deliver your pings. We also collect basic usage data."></p>

            <h2 class="lang" data-es="Servicios de terceros" data-en="Third-party services"></h2>
            <p class="lang" data-es="PingPartner utiliza los siguientes servicios de terceros:" data-en="PingPartner uses the following third-party services:"></p>
            <ul>
                <li class="lang" data-es="Firebase Authentication (anónima) — para identificar tu dispositivo sin cuenta." data-en="Firebase Authentication (anonymous) — to identify your device without an account."></li>
                <li class="lang" data-es="Cloud Firestore — para almacenar los vínculos de pareja." data-en="Cloud Firestore — to store partner links."></li>
                <li class="lang" data-es="Firebase Cloud Functions — para procesar los pings." data-en="Firebase Cloud Functions — to process pings."></li>
                <li class="lang" data-es="Firebase Cloud Messaging — para enviar las notificaciones push." data-en="Firebase Cloud Messaging — to send push notifications."></li>
                <li class="lang" data-es="Amplitude — para analíticas de uso." data-en="Amplitude — for usage analytics."></li>
            </ul>

            <h2 class="lang" data-es="Cómo usamos los datos" data-en="How we use data"></h2>
            <p class="lang" data-es="Usamos estos datos únicamente para vincular tu dispositivo con el de tu pareja y entregar pings entre vosotros. No vendemos tus datos personales ni mostramos publicidad." data-en="We use this data solely to link your device with your partner's and to deliver pings between you. We do not sell your personal data or show ads."></p>

            <h2 class="lang" data-es="Retención" data-en="Retention"></h2>
            <p class="lang" data-es="Conservamos tu vínculo de pareja mientras uses la app. Si desinstalas la app o desvinculas tu pareja, el vínculo asociado deja de usarse y puede eliminarse." data-en="We retain your partner link while you use the app. If you uninstall the app or unlink your partner, the associated link is no longer used and may be deleted."></p>

            <h2 class="lang" data-es="Tus derechos" data-en="Your rights"></h2>
            <p class="lang" data-es="Puedes desvincular a tu pareja en cualquier momento, o solicitar la eliminación de tus datos escribiéndonos al contacto indicado abajo." data-en="You can unlink your partner at any time, or request deletion of your data by contacting us below."></p>

            <h2 class="lang" data-es="Contacto" data-en="Contact"></h2>
            <p class="lang" data-es="Para cualquier pregunta sobre esta política, escríbenos a:" data-en="For any questions about this policy, write to us at:"></p>
            <p><a href="mailto:carnifis+pingpartner@gmail.com">carnifis+pingpartner@gmail.com</a></p>

            <p style="text-align:center;margin-top:2.5rem;">
                <a href="../apps/pingpartner.html" class="lang" data-es="← Volver a PingPartner" data-en="← Back to PingPartner"></a>
                &nbsp;·&nbsp;
                <a href="../support/pingpartner.html" class="lang" data-es="Soporte" data-en="Support"></a>
            </p>
        </div>
    </section>

    <div id="site-footer"></div>

    <script src="../script.js"></script>
</body>
</html>
