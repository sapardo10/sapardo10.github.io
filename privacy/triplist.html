<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Política de privacidad de TripList.">
    <meta name="theme-color" content="#1A6B8A">
    <title>Privacidad · TripList</title>
    <link rel="icon" type="image/png" href="../assets/icons/favicon.png">
    <link rel="stylesheet" href="../styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-accent: #1A6B8A;
            --app-accent-2: #F0A500;
            --app-accent-soft: rgba(26, 107, 138, 0.14);
        }
        .legal { max-width: 760px; margin: 0 auto; }
        .legal h2 { font-size: 1.4rem; font-weight: 700; margin: 2.2rem 0 0.6rem; color: var(--text-dark); }
        .legal p, .legal li { color: var(--text-mid); margin-bottom: 0.8rem; }
        .legal ul { padding-left: 1.4rem; margin-bottom: 0.8rem; }
        .legal .updated { color: var(--text-light); font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="stars-background"></div>

    <!-- Shared navbar injected by script.js -->
    <div id="site-nav"></div>

    <section class="page-section">
        <div class="container">
            <div class="legal">
                <div class="app-card-head" style="margin-bottom:1.5rem;">
                    <img src="../assets/images/apps/triplist.png" alt="TripList" class="app-icon-img">
                    <h1 class="app-name lang" data-es="Política de Privacidad — TripList" data-en="Privacy Policy — TripList"></h1>
                </div>

                <p class="lang" data-es="Esta política describe cómo TripList trata tu información. Valoramos tu privacidad y procuramos recopilar lo mínimo necesario." data-en="This policy describes how TripList handles your information. We value your privacy and aim to collect only the minimum necessary."></p>
                <p class="updated lang" data-es="Última actualización: 15 de junio de 2026" data-en="Last updated: June 15, 2026"></p>

                <h2 class="lang" data-es="Información que recopilamos" data-en="Information we collect"></h2>
                <p class="lang" data-es="TripList guarda tus listas de equipaje, destinos, fechas y el historial de tus viajes localmente en tu dispositivo. Para suscripciones y diagnóstico, los servicios de terceros pueden procesar identificadores anónimos y datos de uso." data-en="TripList stores your packing lists, destinations, dates, and trip history locally on your device. For subscriptions and diagnostics, third-party services may process anonymous identifiers and usage data."></p>

                <h2 class="lang" data-es="Servicios de terceros" data-en="Third-party services"></h2>
                <ul>
                    <li class="lang" data-es="RevenueCat — gestiona las suscripciones (TripList Pro)." data-en="RevenueCat — manages subscriptions (TripList Pro)."></li>
                    <li class="lang" data-es="Firebase Crashlytics — informes de fallos para mejorar la estabilidad." data-en="Firebase Crashlytics — crash reporting to improve stability."></li>
                    <li class="lang" data-es="Firebase Analytics — métricas de uso anónimas y agregadas." data-en="Firebase Analytics — anonymous, aggregated usage metrics."></li>
                </ul>
                <p class="lang" data-es="Nota: tus datos de equipaje se almacenan localmente en el dispositivo (base de datos local) y no se suben a nuestros servidores." data-en="Note: your packing data is stored locally on the device (local database) and is not uploaded to our servers."></p>

                <h2 class="lang" data-es="Cómo usamos los datos" data-en="How we use data"></h2>
                <p class="lang" data-es="Usamos los datos para que la app funcione, ofrecer sugerencias basadas en tu historial, procesar suscripciones, diagnosticar fallos y mejorar la experiencia. No vendemos tu información personal." data-en="We use data to make the app work, provide suggestions based on your history, process subscriptions, diagnose crashes, and improve the experience. We do not sell your personal information."></p>

                <h2 class="lang" data-es="Retención" data-en="Retention"></h2>
                <p class="lang" data-es="Tus datos de equipaje permanecen en tu dispositivo hasta que los elimines o desinstales la app. Los datos de diagnóstico y suscripción se conservan según las políticas de los respectivos servicios de terceros." data-en="Your packing data remains on your device until you delete it or uninstall the app. Diagnostic and subscription data are retained according to each third-party service's policies."></p>

                <h2 class="lang" data-es="Tus derechos" data-en="Your rights"></h2>
                <p class="lang" data-es="Puedes acceder, modificar o eliminar tus datos directamente en la app. También puedes solicitar información sobre tus datos escribiéndonos al correo de contacto." data-en="You can access, edit, or delete your data directly in the app. You may also request information about your data by emailing the contact address below."></p>

                <h2 class="lang" data-es="Contacto" data-en="Contact"></h2>
                <p class="lang" data-es="Para cualquier pregunta sobre privacidad, escríbenos a:" data-en="For any privacy questions, contact us at:"></p>
                <p><a href="mailto:carnifis+triplist@gmail.com">carnifis+triplist@gmail.com</a></p>

                <div class="detail-hero-actions" style="justify-content:center;margin-top:2.5rem;">
                    <a href="../apps/triplist.html" class="btn btn-secondary lang" data-es="← Detalles de la app" data-en="← App details"></a>
                    <a href="../support/triplist.html" class="btn btn-secondary lang" data-es="Soporte" data-en="Support"></a>
                </div>
            </div>
        </div>
    </section>

    <!-- Shared footer injected by script.js -->
    <div id="site-footer"></div>

    <script src="../script.js"></script>
</body>
</html>
