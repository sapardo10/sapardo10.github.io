<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacidad - Stampway</title>
    <link rel="icon" type="image/png" href="../assets/icons/favicon.png">
    <link rel="stylesheet" href="../styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-accent: #1A2F4E;
            --app-accent-2: #C9A84C;
            --app-accent-soft: rgba(201, 168, 76, 0.14);
        }
        .policy { max-width: 780px; margin: 0 auto; }
        .policy h2 { font-size: 1.4rem; font-weight: 700; margin: 2.25rem 0 0.6rem; color: var(--text-dark); }
        .policy p { color: var(--text-mid); margin-bottom: 0.9rem; }
        .policy ul { color: var(--text-mid); margin: 0 0 0.9rem 1.4rem; }
        .policy li { margin-bottom: 0.4rem; }
        .policy .updated { color: var(--text-light); font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="stars-background"></div>

    <div id="site-nav"></div>

    <section class="page-section">
        <div class="container policy">
            <div class="app-card-head">
                <img src="../assets/images/apps/stampway.png" alt="Stampway" class="app-icon-img">
                <h1 style="font-size:2rem;font-weight:800;letter-spacing:-0.02em;margin:0;"><span class="lang" data-es="Política de Privacidad de Stampway" data-en="Stampway Privacy Policy"></span></h1>
            </div>

            <p class="lang" style="margin-top:1.25rem;" data-es="Esta política describe cómo Stampway recopila, usa y protege tu información. Respetamos tu privacidad y solo recopilamos lo necesario para que la app funcione." data-en="This policy describes how Stampway collects, uses and protects your information. We respect your privacy and only collect what's needed for the app to work."></p>
            <p class="updated lang" data-es="Última actualización: 15 de junio de 2026" data-en="Last updated: June 15, 2026"></p>

            <h2 class="lang" data-es="Información que recopilamos" data-en="Information we collect"></h2>
            <p class="lang" data-es="Recopilamos los datos de cuenta que proporcionas al registrarte (correo electrónico o información básica de Google Sign-In) y el contenido que creas en la app, como tus sellos de viaje (país, fechas, transporte y notas)." data-en="We collect the account data you provide when signing up (email or basic Google Sign-In information) and the content you create in the app, such as your travel stamps (country, dates, transport and notes)."></p>

            <h2 class="lang" data-es="Servicios de terceros" data-en="Third-party services"></h2>
            <p class="lang" data-es="Stampway utiliza los siguientes servicios de terceros:" data-en="Stampway uses the following third-party services:"></p>
            <ul>
                <li class="lang" data-es="Firebase Authentication (correo y Google Sign-In) — para el inicio de sesión." data-en="Firebase Authentication (email & Google Sign-In) — for sign-in."></li>
                <li class="lang" data-es="Firebase — para el almacenamiento de tus datos." data-en="Firebase — for storing your data."></li>
                <li class="lang" data-es="RevenueCat — para gestionar las compras dentro de la app." data-en="RevenueCat — to manage in-app purchases."></li>
            </ul>

            <h2 class="lang" data-es="Cómo usamos los datos" data-en="How we use data"></h2>
            <p class="lang" data-es="Usamos tus datos para autenticarte, guardar y sincronizar tus sellos de viaje, habilitar funciones premium y mejorar la app. No vendemos tus datos personales." data-en="We use your data to authenticate you, save and sync your travel stamps, enable premium features and improve the app. We do not sell your personal data."></p>

            <h2 class="lang" data-es="Retención" data-en="Retention"></h2>
            <p class="lang" data-es="Conservamos tus datos mientras mantengas tu cuenta. Si solicitas la eliminación de tu cuenta, borraremos tus datos personales asociados." data-en="We retain your data while your account is active. If you request account deletion, we will remove your associated personal data."></p>

            <h2 class="lang" data-es="Tus derechos" data-en="Your rights"></h2>
            <p class="lang" data-es="Puedes acceder, corregir o eliminar tus datos personales, o solicitar la eliminación de tu cuenta, escribiéndonos al contacto indicado abajo." data-en="You can access, correct or delete your personal data, or request account deletion, by contacting us below."></p>

            <h2 class="lang" data-es="Contacto" data-en="Contact"></h2>
            <p class="lang" data-es="Para cualquier pregunta sobre esta política, escríbenos a:" data-en="For any questions about this policy, write to us at:"></p>
            <p><a href="mailto:carnifis+stampway@gmail.com">carnifis+stampway@gmail.com</a></p>

            <p style="text-align:center;margin-top:2.5rem;">
                <a href="../apps/stampway.html" class="lang" data-es="← Volver a Stampway" data-en="← Back to Stampway"></a>
                &nbsp;·&nbsp;
                <a href="../support/stampway.html" class="lang" data-es="Soporte" data-en="Support"></a>
            </p>
        </div>
    </section>

    <div id="site-footer"></div>

    <script src="../script.js"></script>
</body>
</html>
