<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Política de privacidad de Pausactive.">
    <meta name="theme-color" content="#667eea">
    <title>Privacidad · Pausactive</title>
    <link rel="icon" type="image/png" href="../assets/icons/favicon.png">
    <link rel="stylesheet" href="../styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-accent: #667eea;
            --app-accent-2: #764ba2;
            --app-accent-soft: rgba(102, 126, 234, 0.14);
        }
        .legal { max-width: 760px; margin: 0 auto; }
        .legal h2 { font-size: 1.4rem; font-weight: 700; margin: 2.2rem 0 0.6rem; color: var(--text-dark); }
        .legal p, .legal li { color: var(--text-mid); margin-bottom: 0.8rem; }
        .legal ul { padding-left: 1.4rem; margin-bottom: 0.8rem; }
        .legal .updated { color: var(--text-light); font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="stars-background"></div>

    <!-- Shared navbar injected by script.js -->
    <div id="site-nav"></div>

    <section class="page-section">
        <div class="container">
            <div class="legal">
                <div class="app-card-head" style="margin-bottom:1.5rem;">
                    <img src="../assets/images/apps/pausactive.png" alt="Pausactive" class="app-icon-img">
                    <h1 class="app-name lang" data-es="Política de Privacidad — Pausactive" data-en="Privacy Policy — Pausactive"></h1>
                </div>

                <p class="lang" data-es="Esta política describe cómo Pausactive trata tu información. Valoramos tu privacidad y procuramos recopilar lo mínimo necesario." data-en="This policy describes how Pausactive handles your information. We value your privacy and aim to collect only the minimum necessary."></p>
                <p class="updated lang" data-es="Última actualización: 15 de junio de 2026" data-en="Last updated: June 15, 2026"></p>

                <h2 class="lang" data-es="Información que recopilamos" data-en="Information we collect"></h2>
                <p class="lang" data-es="Pausactive guarda tus recordatorios, preferencias y progreso de metas localmente en tu dispositivo. La app puede recopilar datos técnicos básicos para diagnóstico y métricas de uso anónimas." data-en="Pausactive stores your reminders, preferences, and goal progress locally on your device. The app may collect basic technical data for diagnostics and anonymous usage metrics."></p>

                <h2 class="lang" data-es="Servicios de terceros" data-en="Third-party services"></h2>
                <p class="lang" data-es="La app puede utilizar servicios estándar de analítica y reporte de fallos para mejorar la estabilidad y la experiencia. No vendemos información personal." data-en="The app may use standard analytics and crash reporting services to improve stability and the experience. We do not sell personal information."></p>

                <h2 class="lang" data-es="Cómo usamos los datos" data-en="How we use data"></h2>
                <p class="lang" data-es="Usamos los datos para que la app funcione, enviarte recordatorios, mostrar tu progreso, diagnosticar fallos y mejorar la experiencia. No vendemos tu información personal." data-en="We use data to make the app work, send you reminders, show your progress, diagnose crashes, and improve the experience. We do not sell your personal information."></p>

                <h2 class="lang" data-es="Retención" data-en="Retention"></h2>
                <p class="lang" data-es="Tus recordatorios y preferencias permanecen en tu dispositivo hasta que los elimines o desinstales la app. Los datos de diagnóstico se conservan según las políticas de los respectivos servicios." data-en="Your reminders and preferences remain on your device until you delete them or uninstall the app. Diagnostic data are retained according to each service's policies."></p>

                <h2 class="lang" data-es="Tus derechos" data-en="Your rights"></h2>
                <p class="lang" data-es="Puedes acceder, modificar o eliminar tus datos directamente en la app. También puedes solicitar información sobre tus datos escribiéndonos al correo de contacto." data-en="You can access, edit, or delete your data directly in the app. You may also request information about your data by emailing the contact address below."></p>

                <h2 class="lang" data-es="Contacto" data-en="Contact"></h2>
                <p class="lang" data-es="Para cualquier pregunta sobre privacidad, escríbenos a:" data-en="For any privacy questions, contact us at:"></p>
                <p><a href="mailto:carnifis+pausactive@gmail.com">carnifis+pausactive@gmail.com</a></p>

                <div class="detail-hero-actions" style="justify-content:center;margin-top:2.5rem;">
                    <a href="../apps/pausactive.html" class="btn btn-secondary lang" data-es="← Detalles de la app" data-en="← App details"></a>
                    <a href="../support/pausactive.html" class="btn btn-secondary lang" data-es="Soporte" data-en="Support"></a>
                </div>
            </div>
        </div>
    </section>

    <!-- Shared footer injected by script.js -->
    <div id="site-footer"></div>

    <script src="../script.js"></script>
</body>
</html>
