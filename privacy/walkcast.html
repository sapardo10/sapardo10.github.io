<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacidad - WalkCast</title>
    <link rel="icon" type="image/png" href="../assets/icons/favicon.png">
    <link rel="stylesheet" href="../styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-accent: #E8A44A;
            --app-accent-2: #0D0D0D;
            --app-accent-soft: rgba(232, 164, 74, 0.16);
        }
        .policy { max-width: 780px; margin: 0 auto; }
        .policy h2 { font-size: 1.4rem; font-weight: 700; margin: 2.25rem 0 0.6rem; color: var(--text-dark); }
        .policy p { color: var(--text-mid); margin-bottom: 0.9rem; }
        .policy ul { color: var(--text-mid); margin: 0 0 0.9rem 1.4rem; }
        .policy li { margin-bottom: 0.4rem; }
        .policy .updated { color: var(--text-light); font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="stars-background"></div>

    <div id="site-nav"></div>

    <section class="page-section">
        <div class="container policy">
            <div class="app-card-head">
                <img src="../assets/images/apps/walkcast.png" alt="WalkCast" class="app-icon-img">
                <h1 style="font-size:2rem;font-weight:800;letter-spacing:-0.02em;margin:0;"><span class="lang" data-es="Política de Privacidad de WalkCast" data-en="WalkCast Privacy Policy"></span></h1>
            </div>

            <p class="lang" style="margin-top:1.25rem;" data-es="Esta política describe cómo WalkCast recopila, usa y protege tu información. Respetamos tu privacidad y solo recopilamos lo necesario para que la app funcione." data-en="This policy describes how WalkCast collects, uses and protects your information. We respect your privacy and only collect what's needed for the app to work."></p>
            <p class="updated lang" data-es="Última actualización: 15 de junio de 2026" data-en="Last updated: June 15, 2026"></p>

            <h2 class="lang" data-es="Información que recopilamos" data-en="Information we collect"></h2>
            <p class="lang" data-es="Recopilamos la ubicación que introduces o tu posición GPS para generar tours, tu historial de tours, las preferencias de la app (idioma, voz) y datos de uso y diagnóstico. Si usas tu propia clave de API, se almacena en tu dispositivo." data-en="We collect the location you enter or your GPS position to generate tours, your tour history, app preferences (language, voice), and usage and diagnostic data. If you use your own API key, it is stored on your device."></p>

            <h2 class="lang" data-es="Servicios de terceros" data-en="Third-party services"></h2>
            <p class="lang" data-es="WalkCast utiliza los siguientes servicios de terceros:" data-en="WalkCast uses the following third-party services:"></p>
            <ul>
                <li class="lang" data-es="Firebase Crashlytics — para informes de fallos." data-en="Firebase Crashlytics — for crash reporting."></li>
                <li class="lang" data-es="Amplitude — para analíticas de uso." data-en="Amplitude — for usage analytics."></li>
                <li class="lang" data-es="RevenueCat — para gestionar suscripciones." data-en="RevenueCat — to manage subscriptions."></li>
                <li class="lang" data-es="Proveedores de IA de terceros (Claude, Gemini, DeepSeek, Mistral) — para la generación de tours." data-en="Third-party AI providers (Claude, Gemini, DeepSeek, Mistral) — for tour generation."></li>
            </ul>

            <h2 class="lang" data-es="Cómo usamos los datos" data-en="How we use data"></h2>
            <p class="lang" data-es="Usamos tus datos para generar y narrar tours, guardar tu historial, gestionar suscripciones, diagnosticar fallos y mejorar la app. La ubicación se envía a los proveedores de IA únicamente para generar el contenido del tour. No vendemos tus datos personales." data-en="We use your data to generate and narrate tours, save your history, manage subscriptions, diagnose crashes and improve the app. Location is sent to AI providers solely to generate tour content. We do not sell your personal data."></p>

            <h2 class="lang" data-es="Retención" data-en="Retention"></h2>
            <p class="lang" data-es="El historial de tours se guarda en tu dispositivo y puedes eliminarlo en cualquier momento. Los datos de diagnóstico y analítica se conservan durante periodos limitados conforme a las políticas de cada proveedor." data-en="Tour history is stored on your device and you can delete it any time. Diagnostic and analytics data are retained for limited periods per each provider's policies."></p>

            <h2 class="lang" data-es="Tus derechos" data-en="Your rights"></h2>
            <p class="lang" data-es="Puedes acceder, corregir o eliminar tus datos, borrar tu historial de tours, o solicitar más información escribiéndonos al contacto indicado abajo." data-en="You can access, correct or delete your data, clear your tour history, or request more information by contacting us below."></p>

            <h2 class="lang" data-es="Contacto" data-en="Contact"></h2>
            <p class="lang" data-es="Para cualquier pregunta sobre esta política, escríbenos a:" data-en="For any questions about this policy, write to us at:"></p>
            <p><a href="mailto:carnifis+walkcast@gmail.com">carnifis+walkcast@gmail.com</a></p>

            <p style="text-align:center;margin-top:2.5rem;">
                <a href="../apps/walkcast.html" class="lang" data-es="← Volver a WalkCast" data-en="← Back to WalkCast"></a>
                &nbsp;·&nbsp;
                <a href="../terms/walkcast.html" class="lang" data-es="Términos" data-en="Terms"></a>
                &nbsp;·&nbsp;
                <a href="../support/walkcast.html" class="lang" data-es="Soporte" data-en="Support"></a>
            </p>
        </div>
    </section>

    <div id="site-footer"></div>

    <script src="../script.js"></script>
</body>
</html>
