<!DOCTYPE html>

    <div class="stars-background"></div>

    <header class="app-detail-hero">

            </div>
            <div class="detail-hero-text">
                <span class="eyebrow lang" data-es="Social · Pareja" data-en="Social · Couples"></span>
                <h1>PingPartner</h1>
                <p class="lead lang" data-es="Un ping para tu pareja: envíale una notificación para decirle que piensas en ella." data-en="A ping for your partner: send a notification to let them know you're thinking of them."></p>
                <div class="detail-hero-actions">
                    <a href="https://play.google.com/store/apps/details?id=com.iziapps.pingpartner" class="play-button" target="_blank" rel="noopener noreferrer" aria-label="Google Play">

        </div>

        <div class="container">
            <h2 class="section-title lang" data-es="Qué hace" data-en="What it does"></h2>
            <p class="section-subtitle lang" data-es="Una app minimalista para parejas: envía a tu pareja una notificación 'ping' para decirle que piensas en ella, sin complicaciones." data-en="A minimalist couple app: send your partner a 'ping' notification to say you're thinking of them, no fuss."></p>

            <div class="feature-list">
                <div class="feature-item">
                    <div class="feature-icon">🚀</div>
                    <h3 class="lang" data-es="Sin registro" data-en="No sign-up"></h3>
                    <p class="lang" data-es="Empieza al instante con autenticación anónima, sin crear cuenta." data-en="Start instantly with anonymous authentication, no account needed."></p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🔗</div>
                    <h3 class="lang" data-es="Vincula con un código" data-en="Link with a code"></h3>
                    <p class="lang" data-es="Conéctate con tu pareja usando un sencillo código de 4 caracteres." data-en="Connect with your partner via a simple 4-character code."></p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">💞</div>
                    <h3 class="lang" data-es="Pings instantáneos" data-en="Instant pings"></h3>
                    <p class="lang" data-es="Envía pings con notificación push al instante, en cualquier momento." data-en="Send instant push-notification pings, any time."></p>

                <div class="feature-item">
