<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stampway - Tu pasaporte digital de viajes</title>
    <link rel="icon" type="image/png" href="../assets/icons/favicon.png">
    <link rel="stylesheet" href="../styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-accent: #1A2F4E;
            --app-accent-2: #C9A84C;
            --app-accent-soft: rgba(201, 168, 76, 0.14);
        }
    </style>
</head>
<body>
    <div class="stars-background"></div>

    <div id="site-nav"></div>

    <header class="app-detail-hero">
        <div class="container">
            <div class="detail-hero-art">
                <img src="../assets/images/apps/stampway.png" alt="Stampway" class="detail-hero-icon">
            </div>
            <div class="detail-hero-text">
                <span class="eyebrow lang" data-es="Viajes" data-en="Travel"></span>
                <h1>Stampway</h1>
                <p class="lead lang" data-es="Tu pasaporte digital de viajes: registra y muestra cada país que visitas." data-en="Your digital travel passport: record and showcase every country you visit."></p>
                <div class="detail-hero-actions">
                    <a href="https://play.google.com/store/apps/details?id=com.iziapps.stampway" class="play-button" target="_blank" rel="noopener noreferrer" aria-label="Google Play">
                        <svg class="play-icon" viewBox="0 0 512 512" fill="none" aria-hidden="true"><path d="M48 59v394c0 8 4 15 10 19l219-216L58 40c-6 4-10 11-10 19z" fill="#34A853"/><path d="M390 196l-78-45-58 57 58 57 79-45c14-9 14-15-1-24z" fill="#FBBC04"/><path d="M58 40l219 168 58-57L100 18C84 9 70 14 58 40z" fill="#EA4335"/><path d="M58 472l219-168 57 57-234 135c-16 9-30 4-42-24z" fill="#4285F4"/></svg>
                        <span class="play-label"><small class="lang" data-es="DISPONIBLE EN" data-en="GET IT ON"></small><strong>Google Play</strong></span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <section class="page-section">
        <div class="container">
            <h2 class="section-title lang" data-es="Qué hace" data-en="What it does"></h2>
            <p class="section-subtitle lang" data-es="Un pasaporte digital donde los viajeros registran y presumen los países que han visitado, con sellos, extensiones de tour y mucho más." data-en="A digital passport where travelers record and showcase the countries they have visited, with stamps, tour extensions and much more."></p>

            <div class="feature-list">
                <div class="feature-item">
                    <div class="feature-icon">🛂</div>
                    <h3 class="lang" data-es="Pasaporte digital animado" data-en="Animated digital passport"></h3>
                    <p class="lang" data-es="Una tarjeta de pasaporte animada con tu número de viajero personal." data-en="An animated passport card with your personal travel number."></p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">📍</div>
                    <h3 class="lang" data-es="Añade un sello por visita" data-en="Add a stamp per visit"></h3>
                    <p class="lang" data-es="Registra país, entrada/salida, fecha, transporte y notas en cada sello." data-en="Record country, entry/exit, date, transport and notes for each stamp."></p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🔎</div>
                    <h3 class="lang" data-es="Lista de sellos con filtros" data-en="Searchable stamps list"></h3>
                    <p class="lang" data-es="Busca y filtra tus sellos por año para revivir cada viaje." data-en="Search and filter your stamps by year to relive every trip."></p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🏛️</div>
                    <h3 class="lang" data-es="Extensiones de tour" data-en="Tour extensions"></h3>
                    <p class="lang" data-es="Contenido de gastronomía, cultura y arquitectura para cada destino." data-en="Food, culture and architecture content for each destination."></p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🌍</div>
                    <h3 class="lang" data-es="Multi-idioma y premium" data-en="Multi-language & premium"></h3>
                    <p class="lang" data-es="Disponible en EN/ES/PT/FR. Premium desbloquea países ilimitados (gratis hasta 5) e invitar amigos." data-en="Available in EN/ES/PT/FR. Premium unlocks unlimited countries (free up to 5) and inviting friends."></p>
                </div>
            </div>

            <div class="detail-hero-actions" style="justify-content:center;margin-top:3rem;">
                <a href="../support/stampway.html" class="btn btn-primary lang" data-es="Soporte" data-en="Support"></a>
                <a href="../privacy/stampway.html" class="btn btn-secondary lang" data-es="Privacidad" data-en="Privacy"></a>
            </div>
            <p style="text-align:center;margin-top:2rem;">
                <a href="../index.html" class="lang" data-es="← Volver" data-en="← Back"></a>
            </p>
        </div>
    </section>

    <div id="site-footer"></div>

    <script src="../script.js"></script>
</body>
</html>
