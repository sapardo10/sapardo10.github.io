<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WalkCast - Tu guía turístico con IA</title>
    <link rel="icon" type="image/png" href="../assets/icons/favicon.png">
    <link rel="stylesheet" href="../styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --app-accent: #E8A44A;
            --app-accent-2: #0D0D0D;
            --app-accent-soft: rgba(232, 164, 74, 0.16);
        }
    </style>
</head>
<body>
    <div class="stars-background"></div>

    <div id="site-nav"></div>

    <header class="app-detail-hero">
        <div class="container">
            <div class="detail-hero-art">
                <img src="../assets/images/apps/walkcast.png" alt="WalkCast" class="detail-hero-icon">
            </div>
            <div class="detail-hero-text">
                <span class="eyebrow lang" data-es="Viajes · IA" data-en="Travel · AI"></span>
                <h1>WalkCast</h1>
                <p class="lead lang" data-es="Tu guía turístico con IA: genera y narra la historia de cualquier lugar." data-en="Your AI tour guide: generates and narrates the history of any place."></p>
                <div class="detail-hero-actions">
                    <a href="https://play.google.com/store/apps/details?id=com.walkcast.walkcast" class="play-button" target="_blank" rel="noopener noreferrer" aria-label="Google Play">
                        <svg class="play-icon" viewBox="0 0 512 512" fill="none" aria-hidden="true"><path d="M48 59v394c0 8 4 15 10 19l219-216L58 40c-6 4-10 11-10 19z" fill="#34A853"/><path d="M390 196l-78-45-58 57 58 57 79-45c14-9 14-15-1-24z" fill="#FBBC04"/><path d="M58 40l219 168 58-57L100 18C84 9 70 14 58 40z" fill="#EA4335"/><path d="M58 472l219-168 57 57-234 135c-16 9-30 4-42-24z" fill="#4285F4"/></svg>
                        <span class="play-label"><small class="lang" data-es="DISPONIBLE EN" data-en="GET IT ON"></small><strong>Google Play</strong></span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <section class="page-section">
        <div class="container">
            <h2 class="section-title lang" data-es="Qué hace" data-en="What it does"></h2>
            <p class="section-subtitle lang" data-es="Escribe cualquier lugar y la app genera segmentos históricos ricos con IA, los narra con texto a voz en el dispositivo y un reproductor estilo Spotify." data-en="Enter any location and the app generates rich historical segments with AI, then narrates them with on-device text-to-speech and a Spotify-style player."></p>

            <div class="feature-list">
                <div class="feature-item">
                    <div class="feature-icon">🤖</div>
                    <h3 class="lang" data-es="Tours generados con IA" data-en="AI-generated tours"></h3>
                    <p class="lang" data-es="Tours conscientes del GPS, generados con IA para cualquier ubicación." data-en="GPS-aware tours generated with AI for any location."></p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🎧</div>
                    <h3 class="lang" data-es="Texto sincronizado" data-en="Synced text"></h3>
                    <p class="lang" data-es="Texto sincronizado a nivel de frase con toca-para-saltar." data-en="Sentence-level synced text with tap-to-seek."></p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">▶️</div>
                    <h3 class="lang" data-es="Reproducción en segundo plano" data-en="Background playback"></h3>
                    <p class="lang" data-es="Reproducción en segundo plano y controles en la pantalla de bloqueo." data-en="Background playback and lock-screen controls."></p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🗺️</div>
                    <h3 class="lang" data-es="Extensiones de tour" data-en="Tour extensions"></h3>
                    <p class="lang" data-es="Gastronomía, cultura, arquitectura, joyas ocultas y temas personalizados." data-en="Food, culture, architecture, hidden gems and custom topics."></p>
                </div>
                <div class="feature-item">
                    <div class="feature-icon">🌐</div>
                    <h3 class="lang" data-es="7 idiomas e historial" data-en="7 languages & history"></h3>
                    <p class="lang" data-es="7 idiomas, selector de voz, e historial de tours guardado sin conexión y reproducible." data-en="7 languages, voice selector, and tour history saved offline and replayable."></p>
                </div>
            </div>

            <div class="detail-hero-actions" style="justify-content:center;margin-top:3rem;">
                <a href="../support/walkcast.html" class="btn btn-primary lang" data-es="Soporte" data-en="Support"></a>
                <a href="../privacy/walkcast.html" class="btn btn-secondary lang" data-es="Privacidad" data-en="Privacy"></a>
            </div>
            <p style="text-align:center;margin-top:2rem;">
                <a href="../index.html" class="lang" data-es="← Volver" data-en="← Back"></a>
            </p>
        </div>
    </section>

    <div id="site-footer"></div>

    <script src="../script.js"></script>

</html>
